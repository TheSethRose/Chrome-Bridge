<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chrome Bridge</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <header>
      <div>
        <p class="eyebrow">Agent connection</p>
        <h1>Chrome Bridge</h1>
      </div>
      <div class="connection-control">
        <span id="connection" class="status" aria-live="polite">Connecting…</span>
        <button id="reconnect" class="reconnect" type="button" hidden>Reconnect</button>
      </div>
    </header>

    <main>
      <section aria-labelledby="activity-title">
        <h2 id="activity-title">Live activity</h2>
        <dl class="metrics">
          <div><dt>Running commands</dt><dd id="running">0</dd></div>
          <div><dt>Debugger tabs</dt><dd id="attachments">0</dd></div>
          <div><dt>Requests captured</dt><dd id="requests">0</dd></div>
          <div><dt>Active captures</dt><dd id="captures">0</dd></div>
        </dl>
        <div id="capture-list" class="capture-list"></div>
      </section>

      <section aria-labelledby="commands-title">
        <div class="section-heading">
          <h2 id="commands-title">Recent Commands</h2>
          <button id="clear-logs" type="button">Clear logs</button>
        </div>
        <div class="log-toolbar" aria-label="Command log filters">
          <label class="search-field">
            <span class="visually-hidden">Search commands</span>
            <input id="command-search" type="search" placeholder="Search commands…" autocomplete="off">
          </label>
          <label>
            <span class="visually-hidden">Filter by status</span>
            <select id="status-filter">
              <option value="all">All statuses</option>
              <option value="ok">Success</option>
              <option value="error">Error</option>
            </select>
          </label>
          <label>
            <span class="visually-hidden">Filter by browser tab</span>
            <select id="tab-filter">
              <option value="all">All tabs</option>
            </select>
          </label>
        </div>
        <p id="log-summary" class="log-summary" aria-live="polite"></p>
        <ol id="commands" class="commands">
          <li class="empty">No commands yet.</li>
        </ol>
      </section>
    </main>

    <script src="sidepanel.js" type="module"></script>
  </body>
</html>
